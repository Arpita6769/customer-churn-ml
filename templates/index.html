<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 10px 20px;
    background-color: blue;
    color: white;
    border: none;
}

h3 {
    margin-top: 20px;
}
</style>

<h2>Customer Churn Prediction</h2>

<form action="/predict" method="post">

    <label>Tenure:</label><br>
    <input type="number" name="tenure" required><br><br>

    <label>Monthly Charges:</label><br>
    <input type="number" step="0.01" name="MonthlyCharges" required><br><br>

    <label>Total Charges:</label><br>
    <input type="number" step="0.01" name="TotalCharges" required><br><br>

    <label>Contract Type:</label><br>
    <select name="Contract_Month-to-month">
        <option value="1">Month-to-month</option>
        <option value="0">Other</option>
    </select><br><br>

    <button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>
